# -----------------------------------------------------------------------------
# Section grouping is done via `tags`. The status page renders one section
# per tag. Order below: Infrastructure (TCP-ping to bare IPs — "is the box
# alive on 443"), then WordPress (per-site body checks on the rest of the
# fleet), then TopSale (per-site body checks for webhost1 e-commerce stores).
#
# Body checks: each WordPress / TopSale entry has `body: "TODO"` — replace
# with a string only present on the real homepage. Suggestions:
#   - site name / business name from the <title> or H1
#   - footer copyright line ("© Company Name")
#   - phone number or address
# Avoid generic strings like "WordPress" or "Home" — those appear on error
# pages and theme defaults.
# -----------------------------------------------------------------------------

