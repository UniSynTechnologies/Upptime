status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.unisyn.tech
  # baseUrl: /Upptime
  logoUrl: https://unisyn-wp-assets.s3.amazonaws.com/unisyn-homepage/2021/05/14113831/unisyn-logo-sm.png
  name: UniSyn Technologies
  introTitle: "**UniSyn** is a local web design and development team, specializing in high quality websites and applications!"
  introMessage: This is our status page, here we (and you) can monitor the status of our sites, services, and applications to see just how dedicated we are to high availability in our hosting.
  navbar:
    - title: UniSyn
      href: https://www.unisyn.tech
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"
